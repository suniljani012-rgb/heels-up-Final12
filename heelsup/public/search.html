  <!-- ═══ NAVBAR SEARCH OVERLAY (Kept for consistency with global layout) ═══ -->
  <div class="search-overlay" id="search-overlay" role="search" aria-label="Product quick search">
    <div class="container">
      <div class="search-wrap">
        <span class="search-kicker">Quick Search</span>
        <div class="search-field">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="search" class="search-input-el" id="nav-search-inp" placeholder="heels, bags, sandals…" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Search">
          <button class="search-cls" id="search-close-btn" aria-label="Close search">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
        <div class="search-res" id="nav-search-res" role="listbox" aria-label="Search results"></div>
        <p class="search-hint-txt">Press <kbd style="background:rgba(255,255,255,.1);padding:2px 7px;border-radius:4px;font-size:11px">Enter</kbd> to
          search &nbsp;·&nbsp; <kbd style="background:rgba(255,255,255,.1);padding:2px 7px;border-radius:4px;font-size:11px">Esc</kbd> to close
        </p>
      </div>
    </div>
  </div>

  <!-- ═══ CART BACKDROP & DRAWER ═══ -->
  <div class="cart-bd" id="cart-bd" aria-hidden="true"></div>
  

  <!-- ══════════════════════════════
     SEARCH HERO (Main Page Search)
  ══════════════════════════════ -->
  <div class="search-hero">
    <div class="container">
      <h1>What are you <em>looking for?</em></h1>
      <div class="search-bar-big">
        <input type="text" id="main-search" placeholder="Heels, bags, sandals..." autocomplete="off">
        <button onclick="doMainSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      </div>
      <div class="search-popular">
        <span class="search-popular-label">Popular:</span>
        <span class="popular-tag" onclick="setSearch('block heels')">Block Heels</span>
        <span class="popular-tag" onclick="setSearch('tote bag')">Tote Bag</span>
        <span class="popular-tag" onclick="setSearch('flat sandals')">Flat Sandals</span>
        <span class="popular-tag" onclick="setSearch('wedge')">Wedges</span>
        <span class="popular-tag" onclick="setSearch('sale')">Sale</span>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════
     SEARCH RESULTS AREA
  ══════════════════════════════ -->
  <div class="search-page">
    <div class="container">

      <!-- Results State -->
      <div id="search-results-section" class="search-results-section" style="display:none">
        <div class="search-results-meta" id="results-meta"></div>
        <div class="results-grid" id="results-grid"></div>
      </div>

      <!-- No Results State -->
      <div id="no-results" class="no-results" style="display:none">
        <div class="no-results-icon"><i class="fa-solid fa-box-open"></i></div>
        <h3>No results found</h3>
        <p>Try checking your spelling or use more general terms.</p>
        <a href="/shop.html" class="btn btn-primary btn-pill">Shop All Products</a>
      </div>

      <!-- Default State (Trending) -->
      <div id="default-state" style="padding-top:40px;">
        <h2 class="trending-default-title"><i class="fa-solid fa-fire"></i> Trending Searches</h2>
        <div class="results-grid" id="trending-default"></div>
      </div>

    </div>
  </div>
