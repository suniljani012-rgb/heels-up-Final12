<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – HeelsUp | Free Account Banao</title>
    <meta name="description"
        content="HeelsUp pe free account banao aur pao exclusive deals, order tracking aur wishlist." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .auth-left {
            position: relative;
            overflow: hidden;
            background: var(--color-dark);
        }

        .auth-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
        }

        .auth-left-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(13, 13, 13, 0.35) 0%, rgba(13, 13, 13, 0.88) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .auth-perks {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 36px;
        }

        .auth-perk {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .auth-perk-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(201, 169, 110, 0.15);
            border: 1px solid rgba(201, 169, 110, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .auth-perk-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
        }

        .auth-perk-text strong {
            color: #fff;
            display: block;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .auth-left-quote {
            font-family: var(--font-display);
            font-size: 2.4rem;
            font-weight: 300;
            color: #fff;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .auth-left-quote em {
            font-style: italic;
            color: var(--color-primary-light);
        }

        .auth-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            background: var(--color-white);
            overflow-y: auto;
        }

        .auth-box {
            width: 100%;
            max-width: 440px;
        }

        .auth-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 28px;
            display: block;
            text-decoration: none;
        }

        .auth-logo span {
            color: var(--color-primary);
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .auth-sub a {
            color: var(--color-primary);
            font-weight: 600;
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .auth-terms {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 16px 0 24px;
        }

        .auth-terms a {
            color: var(--color-primary);
        }

        @media(max-width:768px) {
            .auth-page {
                grid-template-columns: 1fr;
            }

            .auth-left {
                display: none;
            }

            .auth-right {
                padding: 40px 24px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-inner">
                <a href="index.html" class="navbar-logo">
                    <span class="navbar-logo-text">Heels<span>Up</span></span>
                </a>
                <div class="navbar-actions">
                    <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-left">
            <img src="https://images.unsplash.com/photo-1596703263926-eb0762ee17e4?w=900&q=80&auto=format&fit=crop"
                alt="" />
            <div class="auth-left-overlay">
                <div class="auth-left-quote">Join <em>HeelsUp</em><br />Family Today</div>
                <p style="font-size:13px;color:rgba(255,255,255,0.45);margin:8px 0 36px">10,000+ customers already love
                    us</p>
                <div class="auth-perks">
                    <div class="auth-perk">
                        <div class="auth-perk-icon"><i class="fa-solid fa-tag"></i></div>
                        <div class="auth-perk-text"><strong>Exclusive Discounts</strong>Members-only deals aur early
                            sale access</div>
                    </div>
                    <div class="auth-perk">
                        <div class="auth-perk-icon"><i class="fa-solid fa-box"></i></div>
                        <div class="auth-perk-text"><strong>Order Tracking</strong>Apne orders ko real-time track karo
                        </div>
                    </div>
                    <div class="auth-perk">
                        <div class="auth-perk-icon"><i class="fa-regular fa-heart"></i></div>
                        <div class="auth-perk-text"><strong>Wishlist</strong>Apni favorite items save karo</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-box">
                <a href="index.html" class="auth-logo">Heels<span>Up</span></a>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-sub">Already account hai? <a href="login.html">Login karo</a></p>

                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">First Name <span class="required">*</span></label>
                        <input type="text" class="form-input" id="reg-fname" placeholder="Priya" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name <span class="required">*</span></label>
                        <input type="text" class="form-input" id="reg-lname" placeholder="Sharma" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="reg-email" placeholder="aapka@email.com" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-phone input-icon"></i>
                        <input type="tel" class="form-input" id="reg-phone" placeholder="+91 98765 43210" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="reg-pass" placeholder="Minimum 8 characters" />
                        <i class="fa-regular fa-eye input-icon input-icon-right" id="toggle-pass"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password <span class="required">*</span></label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="reg-pass2" placeholder="Password dobara daalo" />
                    </div>
                </div>
                <label class="form-check">
                    <input type="checkbox" class="form-check-input" id="agree-terms" />
                    <span class="form-check-label">
                        Main <a href="policy/terms.html" style="color:var(--color-primary)">Terms & Conditions</a> aur
                        <a href="policy/privacy.html" style="color:var(--color-primary)">Privacy Policy</a> se agree
                        karta/karti hoon
                    </span>
                </label>
                <div style="margin-top:24px">
                    <button class="btn btn-primary btn-full btn-lg" id="reg-btn">
                        <i class="fa-solid fa-user-plus"></i> Account Banao
                    </button>
                </div>
            </div>
        </div>
    </main>
    <div class="toast-container" id="toast-container"></div>
    <script>
        window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60));
        document.getElementById('toggle-pass')?.addEventListener('click', function () {
            const inp = document.getElementById('reg-pass');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
        });
        document.getElementById('reg-btn')?.addEventListener('click', async () => {
            const fname = document.getElementById('reg-fname').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const pass2 = document.getElementById('reg-pass2').value;
            const agreed = document.getElementById('agree-terms').checked;
            if (!fname) { showToast('error', 'Error', 'First name daalo.'); return; }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('error', 'Error', 'Valid email daalo.'); return; }
            if (!phone) { showToast('error', 'Error', 'Phone number daalo.'); return; }
            if (!pass || pass.length < 8) { showToast('error', 'Error', 'Password kam se kam 8 characters ka ho.'); return; }
            if (pass !== pass2) { showToast('error', 'Error', 'Dono passwords match nahi kar rahe.'); return; }
            if (!agreed) { showToast('error', 'Error', 'Terms & Conditions se agree karo.'); return; }
            const btn = document.getElementById('reg-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Account ban raha hai...';
            try {
                const res = await API.post('/auth/register', { name: fname, email, phone, password: pass });
                if (res.ok && res.data.data) {
                    Auth.setToken(res.data.data.token);
                    Auth.setUser(res.data.data.user);
                    showToast('success', 'Account Bana Gaya! 🎉', 'HeelsUp family mein aapka swagat hai!');
                    setTimeout(() => window.location.href = 'profile.html', 1500);
                } else {
                    showToast('error', 'Error', res.data?.error || 'Registration fail ho gayi.');
                    btn.disabled = false; btn.innerHTML = 'Account Banao';
                }
            } catch (e) {
                showToast('error', 'Error', 'Registration mein problem aayi. Dobara koshish karo.');
                btn.disabled = false; btn.innerHTML = 'Account Banao';
            }
        });
        function showToast(type, title, msg) {
            const c = document.getElementById('toast-container'); const id = 't' + Date.now();
            const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark' };
            c.insertAdjacentHTML('beforeend', `<div class="toast toast-${type}" id="${id}"><i class="fa-solid ${icons[type] || 'fa-circle-info'} toast-icon"></i><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-message">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">✕</button></div>`);
            setTimeout(() => document.getElementById(id)?.remove(), 4000);
        }
    </script>
    <script src="/app-config.js"></script>
    <script src="/app-api.js"></script>
    <script src="/app-auth.js"></script>
</body>

</html>
