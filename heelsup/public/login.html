<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – HeelsUp</title>
    <meta name="description" content="HeelsUp account mein login karo aur apne orders track karo." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .auth-left {
            position: relative;
            overflow: hidden;
            background: var(--color-dark);
        }

        .auth-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .auth-left-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(13, 13, 13, 0.4) 0%, rgba(13, 13, 13, 0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .auth-left-quote {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 300;
            color: #fff;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .auth-left-quote em {
            font-style: italic;
            color: var(--color-primary-light);
        }

        .auth-left-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .auth-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            background: var(--color-white);
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 36px;
            display: block;
            text-decoration: none;
        }

        .auth-logo span {
            color: var(--color-primary);
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .auth-sub a {
            color: var(--color-primary);
            font-weight: 600;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 24px 0;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--color-white);
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-glow);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--color-primary);
            font-weight: 600;
            float: right;
        }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--color-primary);
            font-weight: 600;
        }

        @media(max-width:768px) {
            .auth-page {
                grid-template-columns: 1fr;
            }

            .auth-left {
                display: none;
            }

            .auth-right {
                padding: 40px 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-inner">
                <a href="index.html" class="navbar-logo">
                    <span class="navbar-logo-text">Heels<span>Up</span></span>
                </a>
                <div class="navbar-actions">
                    <a href="shop.html" class="btn btn-secondary btn-sm">Shop Now</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <!-- Left Image -->
        <div class="auth-left">
            <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=900&q=80&auto=format&fit=crop"
                alt="HeelsUp Fashion" />
            <div class="auth-left-overlay">
                <div class="auth-left-quote">Step Into <em>Style</em><br />Every Day</div>
                <div class="auth-left-sub">10,000+ happy customers across India</div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="auth-right">
            <div class="auth-box">
                <a href="index.html" class="auth-logo">Heels<span>Up</span></a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-sub">New yahan? <a href="register.html">Account banao free mein</a></p>

                <div class="social-btns">
                    <div id="googleBtnWrapper" style="flex: 1; min-height: 44px; display: flex; align-items: center; justify-content: center;">
                        <a href="#" id="customGoogleBtn" class="social-btn" style="width: 100%; justify-content: center; margin: 0;"><i class="fa-brands fa-google" style="color:#EA4335"></i> Google</a>
                    </div>
                    <a href="#" class="social-btn"><i class="fa-brands fa-facebook" style="color:#1877F2"></i>
                        Facebook</a>
                </div>
                <div class="divider-or">ya</div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="login-email" placeholder="aapka@email.com" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Password
                        <a href="#" class="forgot-link">Bhool gaye?</a>
                    </label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="login-pass" placeholder="••••••••" />
                        <i class="fa-regular fa-eye input-icon input-icon-right" id="toggle-pass"></i>
                    </div>
                </div>
                <label class="form-check" style="margin-bottom:24px">
                    <input type="checkbox" class="form-check-input" />
                    <span class="form-check-label">Mujhe yaad rakho</span>
                </label>
                <button class="btn btn-primary btn-full btn-lg" id="login-btn">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
                </button>
                <div class="auth-footer">
                    Account nahi hai? <a href="register.html">Register karo</a>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // Navbar scroll
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
        });
        // Toggle password
        document.getElementById('toggle-pass')?.addEventListener('click', function () {
            const inp = document.getElementById('login-pass');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
        });
        // Login
        document.getElementById('login-btn')?.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('error', 'Invalid Email', 'Valid email address daalo.'); return;
            }
            if (!pass || pass.length < 6) { showToast('error', 'Invalid Password', 'Password kam se kam 6 characters ka hona chahiye.'); return; }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Login ho raha hai...';

            const res = await API.post('/auth/login', { email, password: pass });
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Login';

            if (res && res.ok && res.data.success) {
                Auth.setToken(res.data.data.token);
                Auth.setUser(res.data.data.user);
                showToast('success', 'Login Successful!', 'HeelsUp mein aapka swagat hai!');
                const params = new URLSearchParams(window.location.search);
                setTimeout(() => window.location.href = params.get('redirect') || 'profile.html', 1200);
            } else {
                showToast('error', 'Login Failed', res?.data?.error || 'Email ya password galat hai.');
            }
        });

        // Google Sign-In Integration
        async function handleGoogleCallback(response) {
            try {
                const res = await API.post('/auth/google', { credential: response.credential });
                if (res && res.ok && res.data.success) {
                    Auth.setToken(res.data.data.token);
                    Auth.setUser(res.data.data.user);
                    showToast('success', 'Login Successful!', 'Google login successful.');
                    const params = new URLSearchParams(window.location.search);
                    setTimeout(() => window.location.href = params.get('redirect') || 'profile.html', 1200);
                } else {
                    showToast('error', 'Google Auth Failed', res?.data?.error || 'Invalid Google credential.');
                }
            } catch (e) {
                showToast('error', 'Google Auth Error', 'Something went wrong during Google login.');
            }
        }

        async function initGoogle() {
            try {
                const res = await API.get('/config');
                if (res.ok && res.data && res.data.googleClientId) {
                    const clientId = res.data.googleClientId;
                    const tryRender = () => {
                        if (window.google) {
                            const customBtn = document.getElementById('customGoogleBtn');
                            const wrapper = document.getElementById('googleBtnWrapper');
                            if (customBtn && wrapper) {
                                google.accounts.id.initialize({
                                    client_id: clientId,
                                    callback: handleGoogleCallback
                                });
                                google.accounts.id.renderButton(
                                    wrapper,
                                    { theme: "outline", size: "large", type: "standard", width: customBtn.offsetWidth || 200 }
                                );
                                // Hide the custom design stub to let standard Google button display
                                customBtn.style.display = 'none';
                            }
                        } else {
                            setTimeout(tryRender, 100);
                        }
                    };
                    tryRender();
                }
            } catch (e) {
                console.warn('Google client init failed:', e);
            }
        }
        window.addEventListener('load', initGoogle);

        function showToast(type, title, msg) {
            const c = document.getElementById('toast-container');
            const id = 't' + Date.now();
            const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' };
            c.insertAdjacentHTML('beforeend', `<div class="toast toast-${type}" id="${id}"><i class="fa-solid ${icons[type]} toast-icon"></i><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-message">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">✕</button></div>`);
            setTimeout(() => document.getElementById(id)?.remove(), 4000);
        }
    </script>
</body>

</html>
