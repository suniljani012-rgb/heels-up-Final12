<html lang="en"><head></head><body>﻿



    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="theme-color" content="#E8CCC5">

    <!-- ═══ SEO ═══ -->
    <title>My Wishlist — HeelsUp | Ladies Footwear &amp; Bags</title>
    <meta name="description" content="Your saved favourites on HeelsUp. Shop premium ladies heels, sandals, flats &amp; bags. Free shipping ₹799+. 21,700+ happy customers.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://heelsup.in/wishlist.html">

    <!-- ═══ FONTS ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    
    <link rel="stylesheet" href="/css/customer-theme.css">
    <link rel="stylesheet" href="/css/pages/wishlist.css">



    <div id="navbar"></div>

    <!-- ═══ TOAST ═══ -->
    

    
        
    

    <!-- ═══ MOBILE MENU ═══ -->
    

    <!-- ═══ CART BACKDROP + DRAWER ═══ -->
    <div class="cart-bd" id="cart-bd" aria-hidden="true"></div>
    

    <!-- ═══ BREADCRUMB ═══ -->
    <div class="breadcrumb-sec">
        <div class="container">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/"><i class="fa-solid fa-house" style="font-size:.85em"></i> Home</a>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-cur">My Wishlist</span>
            </nav>
        </div>
    </div>

    <!-- ═══ WISHLIST HERO HEADER ═══ -->
    <div class="wl-hero">
        <div class="container">
            <div class="wl-hero-inner">
                <div>
                    <div class="wl-hero-badge">
                        <span class="wl-hero-badge-dot"></span>
                        Saved Favourites
                    </div>
                    <h1 class="wl-hero-title">My <em>Wishlist</em></h1>
                    <p class="wl-hero-sub" id="wl-hero-sub">Your saved products — shop whenever you're ready</p>
                </div>
                <div class="wl-hero-right">
                    <div class="wl-count-pill">
                        <i class="fa-solid fa-heart"></i>
                        <span id="wl-count-text">Loading…</span>
                    </div>
                    <button class="btn btn-primary btn-sm btn-pill" id="add-all-btn" style="display:none" onclick="addAllToCart()">
                        <i class="fa-solid fa-bag-shopping"></i> Add All to Bag
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ FILTER BAR ═══ -->
    <div class="filter-bar" id="filter-bar" style="display:none" role="toolbar" aria-label="Filter and sort">
        <div class="container">
            <div class="filter-bar-inner">
                <button class="filter-chip active" data-cat="all" onclick="filterWishlist('all',this)">
                    <i class="fa-solid fa-border-all" style="font-size:.8em"></i> All
                </button>
                <button class="filter-chip" data-cat="Heels" onclick="filterWishlist('Heels',this)">👠 Heels</button>
                <button class="filter-chip" data-cat="Flats" onclick="filterWishlist('Flats',this)">🥿 Flats</button>
                <button class="filter-chip" data-cat="Sandals" onclick="filterWishlist('Sandals',this)">👡
                    Sandals</button>
                <button class="filter-chip" data-cat="Bags" onclick="filterWishlist('Bags',this)">👜 Bags</button>

                <div class="filter-sep"></div>

                <div class="filter-right">
                    <select class="sort-sel" id="sort-sel" onchange="sortAndRender()" aria-label="Sort by">
                        <option value="added">Recently Added</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                        <option value="discount">Best Discount</option>
                    </select>
                    <div class="view-toggle">
                        <button class="view-btn active" id="view-grid-btn" onclick="setView('grid')" title="Grid view">
                            <i class="fa-solid fa-grip"></i>
                        </button>
                        <button class="view-btn" id="view-list-btn" onclick="setView('list')" title="List view">
                            <i class="fa-solid fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ WISHLIST MAIN SECTION ═══ -->
    <section class="wishlist-sec">
        <div class="container">
            <div id="wishlist-grid" class="wishlist-grid">
                <!-- Skeletons -->
                <div class="skel-card">
                    <div class="skel-img-el"></div>
                    <div class="skel-bd">
                        <div class="skel-ln w70"></div>
                        <div class="skel-ln w85"></div>
                        <div class="skel-ln w45"></div>
                    </div>
                </div>
                <div class="skel-card">
                    <div class="skel-img-el"></div>
                    <div class="skel-bd">
                        <div class="skel-ln w70"></div>
                        <div class="skel-ln w85"></div>
                        <div class="skel-ln w45"></div>
                    </div>
                </div>
                <div class="skel-card">
                    <div class="skel-img-el"></div>
                    <div class="skel-bd">
                        <div class="skel-ln w70"></div>
                        <div class="skel-ln w85"></div>
                        <div class="skel-ln w45"></div>
                    </div>
                </div>
                <div class="skel-card">
                    <div class="skel-img-el"></div>
                    <div class="skel-bd">
                        <div class="skel-ln w70"></div>
                        <div class="skel-ln w85"></div>
                        <div class="skel-ln w45"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ═══ YOU MAY ALSO LIKE ═══ -->
    <section class="recommend-sec" id="recommend-sec" style="display:none" aria-labelledby="rec-heading">
        <div class="container">
            <div class="sec-hd">
                <span class="sec-label">Trending Now</span>
                <h2 class="sec-title" id="rec-heading">You May Also Like</h2>
                <p class="sec-sub">Curated picks based on your taste</p>
            </div>
            <div class="recommend-products" id="recommend-grid"></div>
            <div style="text-align:center;margin-top:40px">
                <a href="/shop.html" class="btn btn-outline btn-lg btn-pill">Browse All Products <i class="fa-solid fa-arrow-right"></i></a>
            </div>
        </div>
    </section>

    <!-- ═══ SUMMARY BAR ═══ -->
    <div class="summary-bar" id="summary-bar" role="status" aria-live="polite">
        <div class="container">
            <div class="summary-bar-inner">
                <div class="summary-bar-left">
                    <div class="sum-avatars" id="sum-avatars"></div>
                    <div>
                        <div class="sum-info-label">Items saved</div>
                        <div class="sum-info-value" id="sum-count">0 items</div>
                    </div>
                    <div style="width:1px;height:32px;background:var(--border)"></div>
                    <div>
                        <div class="sum-info-label">Total value</div>
                        <div class="sum-info-value" id="sum-total">₹0</div>
                    </div>
                </div>
                <div style="display:flex;gap:10px">
                    <button class="btn btn-outline btn-sm btn-pill" onclick="clearWishlist()">
                        <i class="fa-solid fa-trash-can"></i> Clear All
                    </button>
                    <button class="btn btn-primary btn-sm btn-pill" onclick="addAllToCart()">
                        <i class="fa-solid fa-bag-shopping"></i> Add All to Bag
                    </button>
                </div>
            </div>
        </div>
    </div>
