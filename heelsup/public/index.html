<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEELS UP | Give Value To Your Feet</title>
  <meta name="description" content="Premium luxury women's footwear and handbag e-commerce.">

  <!-- Preconnect & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  
    <link rel="stylesheet" href="/css/customer-theme.css">
    <link rel="stylesheet" href="/css/pages/index.css">
</head>

<body>
    <div id="navbar"></div>

  <!-- Header Navigation -->
  <header class="header" id="header">
    <div class="container nav-container">
      <div class="hamburger" id="mobile-menu-btn">
        <i class="fa-solid fa-bars"></i>
      </div>

      <a href="#/" class="logo">HEELS<span>UP</span></a>

      <nav class="nav-links">
        <a href="#/" class="nav-link" data-route="/">Home</a>
        <a href="#/shop" class="nav-link" data-route="/shop">Shop Collection</a>
        <a href="#/shop?cat=heels" class="nav-link" data-route="/shop">Heels</a>
        <a href="#/shop?cat=bags" class="nav-link" data-route="/shop">Bags</a>
        <a href="#/about" class="nav-link" data-route="/about">Our Story</a>
      </nav>

      <div class="nav-actions">
        <div class="nav-icon" onclick="openSearch()"><i class="fa-solid fa-magnifying-glass"></i></div>
        <a href="#/wishlist" class="nav-icon">
          <i class="fa-regular fa-heart"></i>
          <span class="badge" id="wishlist-badge" style="display:none;">0</span>
        </a>
        <div class="nav-icon" id="cart-btn">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="badge" id="cart-badge" style="display:none;">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content injected by Router -->
  <main id="app">
    <!-- Content renders here -->
  </main>

  <!-- Footer -->
  

  <!-- Cart Drawer -->
  
  
    <div class="drawer-body" id="cart-items">
      <!-- Cart Items injected here -->
    </div>
    <div class="drawer-footer">
      <div class="d-flex justify-between" style="margin-bottom: 1.5rem;">
        <span style="font-weight: 500;">Subtotal</span>
        <span style="font-family: var(--font-heading); font-weight: 600; font-size: 1.2rem;"
          id="cart-subtotal">₹0</span>
      </div>
      <button class="btn btn-primary btn-full" onclick="checkout()">Proceed to Checkout</button>
    </div>
  </div>

  <!-- Mobile Menu Drawer -->
  
  
    <div class="drawer-body">
      <ul
        style="display:flex; flex-direction:column; gap:1.5rem; font-size: 1.2rem; font-family: var(--font-heading); text-transform: uppercase;">
        <li><a href="#/" class="menu-link">Home</a></li>
        <li><a href="#/shop" class="menu-link">Shop All</a></li>
        <li><a href="#/shop?cat=heels" class="menu-link">Heels</a></li>
        <li><a href="#/shop?cat=flats" class="menu-link">Flats</a></li>
        <li><a href="#/shop?cat=bags" class="menu-link">Bags</a></li>
        <li><a href="#/wishlist" class="menu-link">Wishlist</a></li>
      </ul>
    </div>
  </div>

  <!-- Toast Notifications -->
  

  <!-- Application Logic -->
  
  
  
  <script defer src="/js/pages/index.js"></script>

    <script src="/js/core/config.js" defer></script>
    <script src="/js/core/api-client.js" defer></script>
    <script src="/js/core/common-ui.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/wishlist.js" defer></script>
  
    <footer class="footer"></footer>
</body>

</html>
