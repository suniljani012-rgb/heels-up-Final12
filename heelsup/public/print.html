<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeelsUp Print System</title>
    
    <link rel="stylesheet" href="/css/customer-theme.css">
    <link rel="stylesheet" href="/css/pages/print.css">
</head>
<body>
    <div class="print-ui-wrapper no-print">
        <h2>🖨️ Print Management System</h2>
        <div class="controls">
            <input type="text" id="orderId" placeholder="Order ID (e.g. 12)" />
            <button onclick="previewInvoice()">Preview Online Invoice (A4)</button>
            <button onclick="previewOffline()">Preview Offline Bill (Thermal)</button>
            <button onclick="previewPackingSlip()">Preview Packing Slip (4x6)</button>
            <button onclick="previewShippingLabel()">Preview Shipping Label</button>
        </div>
        <p style="text-align:center; color:#666; font-size:14px;">Select an option above to load the template and print. Note: Tax lines are permanently disabled.</p>
    </div>

    <div id="print-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/print.js"></script>
</body>
</html>
