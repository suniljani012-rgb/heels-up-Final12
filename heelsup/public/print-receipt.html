        <div class="container section-padding">
            
  <div id="receipt-content">Loading...</div>
  <script src="app-config.js"></script>
  <script>
    async function loadReceipt() {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');
      const isOffline = urlParams.get('type') === 'offline';
      if(!orderId) { document.getElementById('receipt-content').innerHTML = 'No order ID provided'; return; }
      
      try {
        const token = localStorage.getItem('heelsup_token');
        let order;
        
        if (isOffline) {
          const res = await fetch(HEELSUP_CONFIG.API_BASE + '/api/admin/offline-sales', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const data = await res.json();
          const sale = data.sales.find(s => String(s.id) === orderId || s.sale_number === orderId);
          if (sale) {
            order = {
              id: sale.id,
              order_number: sale.sale_number,
              created_at: sale.created_at,
              customer_name: sale.customer_name,
              customer_phone: sale.customer_phone,
              subtotal_amount: sale.subtotal,
              discount_amount: sale.discount,
              total_amount: sale.total,
              items_json: JSON.stringify(sale.items || [])
            };
          }
        } else {
          const res = await fetch(HEELSUP_CONFIG.API_BASE + '/api/admin/orders', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const data = await res.json();
          order = data.orders.find(o => String(o.id) === orderId || o.order_number === orderId);
        }
        
        if(!order) { document.getElementById('receipt-content').innerHTML = 'Order / Sale not found'; return; }

        // Fetch store settings for receipt header
        let siteName = 'HeelsUp';
        let storeAddress = 'Jodhpur, Rajasthan';
        let taxEnabled = false;
        let gstin = '';

        try {
          const settingsRes = await fetch(HEELSUP_CONFIG.API_BASE + '/api/admin/settings', {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          if (settingsRes.ok) {
            const settingsData = await settingsRes.json();
            const dbSettings = settingsData.settings || {};
            siteName = dbSettings.site_name || 'HeelsUp';
            
            const addrParts = [];
            if (dbSettings.store_address) addrParts.push(dbSettings.store_address);
            if (dbSettings.store_city) addrParts.push(dbSettings.store_city);
            if (dbSettings.store_state) addrParts.push(dbSettings.store_state);
            storeAddress = addrParts.join(', ') || 'Jodhpur, Rajasthan';

            if (dbSettings.tax_settings_config) {
              const parsedTax = JSON.parse(dbSettings.tax_settings_config);
              taxEnabled = !!parsedTax.enabled;
              gstin = parsedTax.gstin || '';
            }
          }
        } catch (errSettings) {
          console.error('Failed to load settings for receipt header', errSettings);
        }
        
        let itemsHtml = '';
        if(order.items_json) {
          try {
            const items = JSON.parse(order.items_json);
            items.forEach(item => {
              itemsHtml += `<div class="item-row">
                <span style="flex:2">${item.name || item.product_name} x${item.qty||1}</span>
                <span style="flex:1" class="text-right">₹${item.lineTotal || (item.price*(item.qty||1))}</span>
              </div>`;
            });
          } catch(e){}
        }

        const html = `
          <div class="text-center">
            <h1>${siteName}</h1>
            <p>${storeAddress}</p>
            ${taxEnabled && gstin ? `<p>GSTIN: ${gstin}</p>` : ''}
          </div>
          <div class="line"></div>
          <div><span class="bold">Order No:</span> ${order.order_number || order.id}</div>
          <div><span class="bold">Date:</span> ${new Date(order.created_at).toLocaleString()}</div>
          <div><span class="bold">Customer:</span> ${order.customer_name || 'Walk-in'}</div>
          <div><span class="bold">Phone:</span> ${order.customer_phone || 'N/A'}</div>
          <div class="line"></div>
          <div class="item-row bold">
            <span style="flex:2">Item</span>
            <span style="flex:1" class="text-right">Amount</span>
          </div>
          ${itemsHtml}
          <div class="line"></div>
          <div class="item-row"><span>Subtotal:</span> <span class="text-right">₹${order.subtotal_amount || order.total_amount}</span></div>
          <div class="item-row"><span>Discount:</span> <span class="text-right">₹${order.discount_amount || 0}</span></div>
          <div class="line"></div>
          <div class="item-row bold" style="font-size:16px;"><span>Total:</span> <span class="text-right">₹${order.total_amount}</span></div>
          <div class="line"></div>
          <div class="text-center" style="margin-top:20px;">
            <p>Thank you for shopping with us!</p>
            <p>Visit again: heelsup.in</p>
          </div>
        `;
        document.getElementById('receipt-content').innerHTML = html;
        setTimeout(() => window.print(), 500);
      } catch(err) {
        document.getElementById('receipt-content').innerHTML = 'Failed to load receipt: ' + err.message;
      }
    }
    loadReceipt();
  </script>
