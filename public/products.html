<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products Admin - HeelsUp</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/css/pages/products.css" />
    <link rel="stylesheet" href="/css/pages/products.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
</head>

<body>
    <div class="admin-wrap">
        <div class="admin-card" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
            <div>
                <h1 style="margin:0;font-size:28px">Products Admin</h1>
                <p style="margin:6px 0 0;color:#666">Cloudflare backend se live catalog manage karo.</p>
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-secondary" id="refresh-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="btn btn-ghost" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </div>

        <div class="admin-card">
            <h2 style="margin:0 0 12px;font-size:20px">Add / Update Product</h2>
            <input type="hidden" id="p-id" />
            <div class="admin-grid">
                <input class="form-input" id="p-name" placeholder="Product name" />
                <input class="form-input" id="p-sku" placeholder="SKU" />
                <input class="form-input" id="p-category" placeholder="Category" />
                <input class="form-input" id="p-price" type="number" placeholder="Price" />
                <input class="form-input" id="p-mrp" type="number" placeholder="MRP (optional)" />
                <input class="form-input" id="p-stock" type="number" placeholder="Stock" />
                <input class="form-input" id="p-image" placeholder="Image URL" />
                <input class="form-input" id="p-sizes" placeholder="Sizes comma separated (36,37,38)" />
                <label style="display:flex;align-items:center;gap:8px;font-size:14px"><input type="checkbox" id="p-active" checked /> Active</label>
            </div>
            <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-primary" id="save-btn"><i class="fa-solid fa-check"></i> Save Product</button>
                <button class="btn btn-ghost" id="clear-btn">Clear</button>
            </div>
        </div>

        <div class="admin-card">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                <h2 style="margin:0;font-size:20px">All Products</h2>
                <input class="form-input" id="search" placeholder="Search by name or SKU" style="max-width:280px" />
            </div>
            <div style="overflow:auto">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>SKU</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="app-config.js"></script>
    <script src="app-auth.js"></script>
    <script>
        let products = [];

        function showToast(type, title, msg) {
            const c = document.getElementById('toast-container');
            const id = 't' + Date.now();
            const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
            c.insertAdjacentHTML('beforeend', `<div class="toast toast-${type}" id="${id}"><i class="fa-solid ${icons[type] || icons.info} toast-icon"></i><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-message">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">�</button></div>`);
            setTimeout(() => document.getElementById(id)?.remove(), 3500);
        }

        function resetForm() {
            document.getElementById('p-id').value = '';
            ['p-name', 'p-sku', 'p-category', 'p-price', 'p-mrp', 'p-stock', 'p-image', 'p-sizes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('p-active').checked = true;
        }

        function fillForm(p) {
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-name').value = p.name || '';
            document.getElementById('p-sku').value = p.sku || '';
            document.getElementById('p-category').value = p.category || '';
            document.getElementById('p-price').value = p.price || 0;
            document.getElementById('p-mrp').value = p.original_price || '';
            document.getElementById('p-stock').value = p.stock || 0;
            document.getElementById('p-image').value = p.image_url || '';
            document.getElementById('p-sizes').value = (p.sizes || []).join(',');
            document.getElementById('p-active').checked = !!p.active;
        }

        function render() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            const rows = products.filter(p => !q || (p.name || '').toLowerCase().includes(q) || (p.sku || '').toLowerCase().includes(q));
            document.getElementById('list').innerHTML = rows.map(p => `
                <tr>
                    <td>${p.name || ''}</td>
                    <td>${p.sku || '-'}</td>
                    <td>${p.category || '-'}</td>
                    <td>?${Number(p.price || 0).toLocaleString('en-IN')}</td>
                    <td>${p.stock || 0}</td>
                    <td>${p.active ? 'Active' : 'Inactive'}</td>
                    <td>
                        <div class="row-actions">
                            <button class="btn btn-secondary btn-sm" onclick="editProduct(${p.id})">Edit</button>
                            <button class="btn btn-ghost btn-sm" style="color:#d33" onclick="deleteProduct(${p.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function loadProducts() {
            try {
                products = await HeelsUpAuth.api('/api/admin/products');
                render();
            } catch (err) {
                if (err.status === 401 || err.status === 403) {
                    showToast('error', 'Unauthorized', 'Admin login required.');
                    setTimeout(() => window.location.href = 'login.html', 1200);
                    return;
                }
                showToast('error', 'Load Failed', err.message || 'Unable to fetch products.');
            }
        }

        async function saveProduct() {
            const id = document.getElementById('p-id').value;
            const body = {
                name: document.getElementById('p-name').value.trim(),
                sku: document.getElementById('p-sku').value.trim(),
                category: document.getElementById('p-category').value.trim() || 'Heels',
                price: Number(document.getElementById('p-price').value || 0),
                mrp: document.getElementById('p-mrp').value ? Number(document.getElementById('p-mrp').value) : null,
                stock: Number(document.getElementById('p-stock').value || 0),
                image_url: document.getElementById('p-image').value.trim(),
                sizes: document.getElementById('p-sizes').value.split(',').map(s => s.trim()).filter(Boolean),
                active: document.getElementById('p-active').checked
            };

            if (!body.name || body.price <= 0) {
                showToast('error', 'Invalid Data', 'Name aur valid price required hai.');
                return;
            }

            try {
                if (id) {
                    await HeelsUpAuth.api('/api/admin/products/' + id, { method: 'PUT', body: JSON.stringify(body) });
                } else {
                    await HeelsUpAuth.api('/api/admin/products', { method: 'POST', body: JSON.stringify(body) });
                }
                showToast('success', 'Saved', 'Product saved successfully.');
                resetForm();
                loadProducts();
            } catch (err) {
                showToast('error', 'Save Failed', err.message || 'Unable to save product.');
            }
        }

        window.editProduct = function (id) {
            const p = products.find(x => x.id === id);
            if (p) fillForm(p);
        };

        window.deleteProduct = async function (id) {
            if (!confirm('Product delete karna hai?')) return;
            try {
                await HeelsUpAuth.api('/api/admin/products/' + id, { method: 'DELETE' });
                showToast('success', 'Deleted', 'Product deleted.');
                loadProducts();
            } catch (err) {
                showToast('error', 'Delete Failed', err.message || 'Unable to delete product.');
            }
        };

        document.getElementById('save-btn').addEventListener('click', saveProduct);
        document.getElementById('clear-btn').addEventListener('click', resetForm);
        document.getElementById('refresh-btn').addEventListener('click', loadProducts);
        document.getElementById('search').addEventListener('input', render);
        document.getElementById('logout-btn').addEventListener('click', () => {
            HeelsUpAuth.clearSession();
            window.location.href = 'login.html';
        });

        loadProducts();
    </script>
</body>

</html>
