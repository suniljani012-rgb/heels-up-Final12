    <!-- Performance: pre-establish connections to image CDN and API worker -->
    <link rel="preconnect" href="https://heelsupnew.heelsup.workers.dev" />
    <link rel="dns-prefetch" href="https://heelsupnew.heelsup.workers.dev" />
    <link rel="preconnect" href="https://heelsup.in" />
    <link rel="dns-prefetch" href="https://heelsup.in" />
    <!-- media.heelsup.in is the actual R2 CDN every product image loads from —
         it was missing a preconnect, forcing every first image request to pay
         a full DNS + TLS handshake before the byte-1 could even start downloading -->
    <link rel="preconnect" href="https://media.heelsup.in" crossorigin />
    <link rel="dns-prefetch" href="https://media.heelsup.in" />

    <!--
      Removed (2026-07-23, perf pass): jQuery, Bootstrap 4 JS bundle, AdminLTE CSS+JS,
      tempusdominus-bootstrap-4 CSS, icheck-bootstrap CSS, animate.css.
      Verified zero usage across the entire React source — no data-toggle/data-bs-*
      attributes, no jQuery($) calls, no AdminLTE/icheck/animate__ classNames anywhere.
      The app already uses lucide-react for icons and framer-motion for animation.
      These were leftover template scaffolding, loading render-blocking on EVERY
      page (including checkout) for nothing. Removing them cuts real, unused
      blocking payload from first paint on every route, including the storefront
      pages where the "slow images" complaint was coming from.
    -->
    <script src="/frame_ant.js" defer></script>
